[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "olano"
version = "0.0.0"
description = "Placeholder package for Olano open-source PyPI distribution."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Olano AI" }]
classifiers = [
  "Development Status :: 1 - Planning",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only"
]

[project.urls]
Homepage = "https://github.com/olano-ai/olano-oss"
Repository = "https://github.com/olano-ai/olano-oss"
